name: Build Windows EXE Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and publish Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name "WGFMU Designer"
          --collect-all PySide6
          --collect-all pyqtgraph
          main.py

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WGFMU Designer.exe
          generate_release_notes: true
